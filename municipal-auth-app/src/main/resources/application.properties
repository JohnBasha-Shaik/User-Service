# Server
server.port=8080

# DataSource (update username/password as appropriate)
spring.datasource.url=jdbc:mysql://localhost:3306/municipal_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JSP view resolver
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# JWT configuration
app.jwt.secret=change_this_to_a_very_long_random_secret_key_value_at_least_64_chars
app.jwt.expiration-ms=86400000

# Logging
logging.level.org.springframework.security=INFO